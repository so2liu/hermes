name: Deploy Cloud Server

on:
  push:
    branches: [main]
    paths:
      - "cloud/**"
      - ".github/workflows/deploy-cloud.yml"

env:
  IMAGE: ghcr.io/so2liu/hermes-cloud

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: cloud
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing="$missing DEPLOY_HOST"
          [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && missing="$missing DEPLOY_SSH_KEY"
          [ -z "${{ secrets.HERMES_AUTH_TOKEN }}" ] && missing="$missing HERMES_AUTH_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "cloud/docker-compose.yml"
          target: "~/hermes-cloud"
          overwrite: true

      - name: Deploy via docker compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/hermes-cloud/cloud

            # Write .env for docker compose
            cat > .env <<EOF
            HERMES_AUTH_TOKEN=${{ secrets.HERMES_AUTH_TOKEN }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            EOF
            sed -i 's/^[[:space:]]*//' .env

            # Pull new image and restart
            docker compose pull
            docker compose up -d

            # Clean up legacy containers
            docker rm -f cloud-hermes-cloud-1 2>/dev/null || true

            # Verify health
            sleep 3
            if curl -sf http://localhost:8765 > /dev/null; then
              echo "Hermes Cloud Server is running"
            else
              echo "Health check failed"
              docker compose logs --tail=50
              exit 1
            fi
