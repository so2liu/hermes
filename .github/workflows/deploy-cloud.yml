name: Deploy Cloud Server

on:
  push:
    branches: [main]
    paths:
      - "cloud/**"
      - ".github/workflows/deploy-cloud.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing="$missing DEPLOY_HOST"
          [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && missing="$missing DEPLOY_SSH_KEY"
          [ -z "${{ secrets.HERMES_AUTH_TOKEN }}" ] && missing="$missing HERMES_AUTH_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Copy cloud/ to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "cloud/"
          target: "~/hermes-cloud"
          overwrite: true

      - name: Deploy via Docker
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/hermes-cloud/cloud

            # Write env file (excluded from Docker image by .dockerignore)
            cat > .env <<EOF
            HERMES_AUTH_TOKEN=${{ secrets.HERMES_AUTH_TOKEN }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            EOF
            sed -i 's/^[[:space:]]*//' .env

            # Build new image before stopping old container
            docker compose build

            # Swap containers
            docker compose up -d

            # Verify health
            sleep 3
            if curl -sf http://localhost:8765 > /dev/null; then
              echo "Hermes Cloud Server is running"
            else
              echo "Health check failed"
              docker compose logs --tail=50
              exit 1
            fi
