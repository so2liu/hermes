services:
  hermes-cloud:
    build: .
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - PORT=8765
      - HERMES_AUTH_TOKEN=${HERMES_AUTH_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - hermes-data:/app/.hermes

volumes:
  hermes-data:
